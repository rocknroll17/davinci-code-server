name: Release

# Fires when a semver tag (vX.Y.Z) is pushed. Does two things:
#   1. Builds the Docker image with semver tags (v1.1.0, 1.1, 1, latest).
#   2. Creates a GitHub Release with auto-generated notes.
#
# The model checkpoint (model.pt) is NOT in the repo, so it is not attached here.
# Upload it once per release from a machine that has it:
#   gh release upload <tag> checkpoints/model.pt --repo rocknroll17/davinci-code-server

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: write     # create the GitHub Release
  packages: write     # push the Docker image

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Validate semver tag
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          if ! printf '%s' "$tag" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo "::error::Tag '$tag' is not valid semver (expected vX.Y.Z[-suffix]); release skipped."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0     # full history so release notes can reach prior tag

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata (semver tags)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern=v{{version}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          draft: false
          prerelease: false
