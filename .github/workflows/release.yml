name: Release

# Fires when a semver tag (vX.Y.Z) is pushed. Does two things:
#   1. Builds the Docker image with semver tags (v1.1.0, 1.1, 1, latest).
#   2. Creates a GitHub Release with auto-generated notes.
#
# The model is NOT in git. It lives as a GHCR OCI artifact (the source of truth):
#   ghcr.io/<owner>/davinci-model:<MODEL_TAG>   (publish with scripts/publish_model.sh)
# This workflow oras-pulls that artifact into the build context so the model is
# baked into the image — deploy then needs no mount and no separate model fetch.
# Pin the model version with repo variable MODEL_TAG (defaults to "latest").

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: write     # create the GitHub Release
  packages: write     # push the Docker image

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Validate semver tag
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          if ! printf '%s' "$tag" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo "::error::Tag '$tag' is not valid semver (expected vX.Y.Z[-suffix]); release skipped."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0     # full history so release notes can reach prior tag

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up ORAS
        uses: oras-project/setup-oras@v2

      - name: Pull model artifact into build context (bake into image)
        env:
          MODEL_TAG: ${{ vars.MODEL_TAG || 'latest' }}
        run: |
          mkdir -p checkpoints
          oras pull "${REGISTRY}/${{ github.repository_owner }}/davinci-model:${MODEL_TAG}" -o checkpoints
          test -f checkpoints/model.pt
          echo "Baked model: davinci-model:${MODEL_TAG} ($(du -h checkpoints/model.pt | cut -f1))"

      - name: Extract image metadata (semver tags)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern=v{{version}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          draft: false
          prerelease: false
